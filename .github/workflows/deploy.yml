name: 同步笔记 + 构建部署

on:
  # 允许手动触发
  workflow_dispatch:

  # 允许被其他 workflow 调用（外部 cron 每 15 分钟触发）
  workflow_call:
    inputs:
      skip_deploy:
        description: "跳过 Pages 部署（由调用方自行部署时使用）"
        type: boolean
        required: false
        default: false

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install httpx

      - name: 同步 Notion 数据库
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: python3 scripts/sync_notion.py

      - name: 清理失效链接
        run: python3 scripts/cleanup_dead_links.py

      - name: 生成侧边栏
        run: python3 scripts/generate_sidebar.py

      - name: Commit 同步内容
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          git diff --staged --quiet || git commit -m "🔄 自动同步更新"
          git push

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build VitePress
        run: npx vitepress build

      - name: Setup Pages
        if: ${{ !inputs.skip_deploy }}
        uses: actions/configure-pages@v4

      - name: Upload artifact
        if: ${{ !inputs.skip_deploy }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: .vitepress/dist

      - name: Deploy to GitHub Pages
        if: ${{ !inputs.skip_deploy }}
        id: deployment
        uses: actions/deploy-pages@v4
